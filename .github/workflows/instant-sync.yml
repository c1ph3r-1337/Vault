name: Instant Fork Sync

on:
  repository_dispatch:
    types: [upstream-sync]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.UPSTREAM_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"

      - name: Sync upstream main
        run: |
          git config --global merge.ours.driver true
          git remote add upstream https://x-access-token:${{ secrets.UPSTREAM_TOKEN }}@github.com/c1ph3r-1337/Vault.git
          git fetch upstream main
          git checkout main
          git merge upstream/main --no-edit || --no-edit
          git push origin main
