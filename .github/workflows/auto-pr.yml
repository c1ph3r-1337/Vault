name: Sync Fork Main to Upstream Main (Exclude Files)

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add upstream remote (authenticated)
        run: |
          git remote add upstream https://c1ph3r-1337:${{ secrets.UPSTREAM_TOKEN }}@github.com/c1ph3r-1337/Vault.git

      - name: Show remotes
        run: |
          git remote -v

      - name: Test upstream access
        run: |
          git ls-remote upstream

      - name: Fetch upstream main
        run: |
          git fetch upstream main

      - name: Remove excluded files
        run: |
          rm -rf .github/workflows
          rm -f .gitattributes

      - name: Commit changes
        run: |
          git add -A
          git commit -m "Sync update excluding workflow and gitattributes" || echo "Nothing to commit"

      - name: Push to upstream main
        run: |
          git push upstream HEAD:main
