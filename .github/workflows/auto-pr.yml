name: Push Fork Main to Upstream Main (Exclude Files)

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.UPSTREAM_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "sync-bot"
          git config user.email "sync-bot@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/c1ph3r-1337/Vault.git

      - name: Fetch upstream
        run: |
          git fetch upstream main

      - name: Merge upstream changes into fork main
        run: |
          git checkout main
          git merge upstream/main --no-edit || true

      - name: Remove excluded files
        run: |
          rm -rf .github/workflows
          rm -f .gitattributes

      - name: Commit cleaned changes
        run: |
          git add -A
          git commit -m "Sync excluding workflows and gitattributes" || echo "Nothing to commit"

      - name: Push cleaned code to upstream main
        run: |
          git push https://x-access-token:${{ secrets.UPSTREAM_TOKEN }}@github.com/c1ph3r-1337/Vault.git HEAD:main
