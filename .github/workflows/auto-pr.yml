name: Sync Fork Main to Upstream Main (Exclude Files)

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Remove excluded files
        run: |
          rm -rf .github/workflows
          rm -f .gitattributes

      - name: Add upstream remote
        run: |
          git remote add upstream https://x-access-token:${{ secrets.UPSTREAM_TOKEN }}@github.com/c1ph3r-1337/Vault.git

      - name: Force push fork main to upstream main
        run: |
          git add -A
          git commit -m "Sync fork main to upstream main (excluded workflow + gitattributes)" || echo "Nothing to commit"
          git push upstream HEAD:main --force
