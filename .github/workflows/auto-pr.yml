name: Sync Fork Main to Upstream Main (Exclude Files)


on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Debug token identity
        run: |
           curl -s -H "Authorization: token ${{ secrets.UPSTREAM_TOKEN }}" https://api.github.com/user

      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://x-access-token:${{ secrets.UPSTREAM_TOKEN }}@github.com/c1ph3r-1337/Vault.git

      - name: Test upstream authentication
        run: |
          git ls-remote upstream

      - name: Fetch upstream main
        run: |
          git fetch upstream main

      - name: Merge upstream main into fork main
        run: |
          git merge upstream/main --no-edit || true

      - name: Remove excluded files
        run: |
          rm -rf .github/workflows
          rm -f .gitattributes

      - name: Commit cleaned changes
        run: |
          git add -A
          git commit -m "Sync from fork main (excluding workflow and gitattributes)" || echo "Nothing to commit"

      - name: Push to upstream main (no force)
        run: |
          git push upstream HEAD:main
