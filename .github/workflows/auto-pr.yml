name: Sync Fork Main to Upstream Main (No Force)

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://x-access-token:${{ secrets.UPSTREAM_TOKEN }}@github.com/c1ph3r-1337/Vault.git

      - name: Fetch upstream main
        run: |
          git fetch upstream main

      - name: Merge upstream main into fork main
        run: |
          git merge upstream/main --no-edit || true

      - name: Remove excluded files
        run: |
          rm -rf .github/workflows
          rm -f .gitattributes

      - name: Commit changes
        run: |
          git add -A
          git commit -m "Sync fork main to upstream main (excluded files)" || echo "No changes"

      - name: Push normally to upstream main
        run: |
          git push upstream HEAD:main
