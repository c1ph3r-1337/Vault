name: Trigger Fork Sync

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch sync event to fork
        env:
          TOKEN: ${{ secrets.FORK_TRIGGER_TOKEN }}
        run: |
          curl -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/XYR05/Vault/dispatches \
            --data '{"event_type":"upstream-sync"}'
