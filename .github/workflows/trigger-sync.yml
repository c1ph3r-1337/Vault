name: Trigger Fork Sync

on:
  push:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch sync event
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.FORK_TRIGGER_TOKEN }}" \
          https://api.github.com/repos/XYR05/Vault/dispatches \
          -d '{"event_type":"upstream-sync"}'
